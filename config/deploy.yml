service: wots-clone
image: aosik/wots-clone

servers:
  web:
    - 89.167.56.225

proxy:
  ssl: true
  host: wots.hackjc.org
  app_port: 3000
  healthcheck:
    path: /
    interval: 5

registry:
  username: aosik
  password:
    - KAMAL_REGISTRY_PASSWORD


builder:
  arch: amd64

# SQLite cache lives on the host so it survives container replacements.
volumes:
  - "/opt/wots-clone/data:/data"

# PORT / NODE_ENV / DB_PATH are baked into the image.
