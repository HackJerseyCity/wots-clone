service: wots-clone
image: aosik/wots-clone

servers:
  web:
    - 89.167.56.225

proxy:
  ssl: true
  host: wots.hackjc.org
  app_port: 3000
  healthcheck:
    path: /
    interval: 5

registry:
  username: aosik
  password:
    - KAMAL_REGISTRY_PASSWORD


builder:
  arch: amd64

# The wots-clone container needs no runtime env; PORT/NODE_ENV are baked in.
