<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#fafaf9" media="(prefers-color-scheme: light)" />
  <meta name="theme-color" content="#0c0c0d" media="(prefers-color-scheme: dark)" />
  <title>wots</title>
  <style>
    :root {
      color-scheme: light dark;
      --bg: #fafaf9;
      --surface: #ffffff;
      --surface-2: #f5f5f4;
      --border: rgba(20, 20, 20, 0.08);
      --border-strong: rgba(20, 20, 20, 0.14);
      --text: #18181b;
      --text-muted: #6b7280;
      --text-subtle: #9ca3af;
      --accent: #1d4ed8;
      --accent-hover: #1e40af;
      --accent-fg: #ffffff;
      --danger: #b91c1c;
      --danger-bg: rgba(185, 28, 28, 0.08);
      --radius: 14px;
      --radius-sm: 10px;
      --shadow-1: 0 1px 2px rgba(20, 20, 20, 0.04), 0 2px 8px rgba(20, 20, 20, 0.04);
      --shadow-2: 0 4px 16px rgba(20, 20, 20, 0.06), 0 2px 4px rgba(20, 20, 20, 0.04);
      --focus: 0 0 0 3px rgba(29, 78, 216, 0.28);
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #0c0c0d;
        --surface: #17171a;
        --surface-2: #1f1f23;
        --border: rgba(255, 255, 255, 0.08);
        --border-strong: rgba(255, 255, 255, 0.16);
        --text: #f4f4f5;
        --text-muted: #a1a1aa;
        --text-subtle: #71717a;
        --accent: #60a5fa;
        --accent-hover: #93c5fd;
        --accent-fg: #0c0c0d;
        --danger: #fca5a5;
        --danger-bg: rgba(248, 113, 113, 0.12);
        --shadow-1: 0 1px 2px rgba(0, 0, 0, 0.4), 0 2px 8px rgba(0, 0, 0, 0.3);
        --shadow-2: 0 4px 16px rgba(0, 0, 0, 0.5), 0 2px 4px rgba(0, 0, 0, 0.3);
        --focus: 0 0 0 3px rgba(96, 165, 250, 0.32);
      }
    }

    *, *::before, *::after { box-sizing: border-box; }
    html { -webkit-text-size-adjust: 100%; }
    body {
      margin: 0;
      min-height: 100dvh;
      font-family: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", system-ui, sans-serif;
      font-size: 16px;
      line-height: 1.5;
      color: var(--text);
      background: var(--bg);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    header {
      padding: 18px max(20px, env(safe-area-inset-left)) 18px max(20px, env(safe-area-inset-right));
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      border-bottom: 1px solid var(--border);
      background: var(--bg);
    }
    .brand {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      font-weight: 600;
      letter-spacing: -0.01em;
      color: var(--text);
    }
    .brand-mark {
      width: 22px; height: 22px;
      border-radius: 6px;
      background: linear-gradient(135deg, var(--accent), color-mix(in srgb, var(--accent) 60%, #a855f7));
      display: inline-block;
    }
    .who {
      color: var(--text-muted);
      font-size: 13px;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }
    .who .dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: #22c55e;
      box-shadow: 0 0 0 3px rgba(34, 197, 94, 0.18);
    }

    main {
      max-width: 620px;
      margin: 0 auto;
      padding:
        clamp(24px, 6vw, 48px)
        max(20px, env(safe-area-inset-left))
        max(24px, env(safe-area-inset-bottom))
        max(20px, env(safe-area-inset-right));
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: clamp(20px, 5vw, 28px);
      box-shadow: var(--shadow-1);
    }

    .step-head {
      margin: 0 0 20px;
    }
    .step-head h1 {
      margin: 0 0 6px;
      font-size: clamp(22px, 5vw, 26px);
      font-weight: 600;
      letter-spacing: -0.02em;
    }
    .step-head p {
      margin: 0;
      color: var(--text-muted);
      font-size: 15px;
    }
    .step-head p b { color: var(--text); font-weight: 500; }

    label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      color: var(--text-muted);
      margin-bottom: 8px;
      letter-spacing: 0.01em;
    }

    input[type="tel"], input[type="text"] {
      width: 100%;
      height: 48px;
      padding: 0 14px;
      font: inherit;
      font-size: 16px;
      color: var(--text);
      background: var(--surface);
      border: 1px solid var(--border-strong);
      border-radius: var(--radius-sm);
      transition: border-color 120ms ease, box-shadow 120ms ease;
      -webkit-appearance: none;
      appearance: none;
    }
    input::placeholder { color: var(--text-subtle); }
    input:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: var(--focus);
    }
    #code {
      font-variant-numeric: tabular-nums;
      letter-spacing: 0.5em;
      text-align: center;
      font-size: 22px;
      padding-left: 0.5em;
    }

    .btn {
      appearance: none;
      -webkit-appearance: none;
      border: 0;
      font: inherit;
      font-weight: 500;
      cursor: pointer;
      border-radius: var(--radius-sm);
      padding: 0 20px;
      height: 48px;
      min-width: 44px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: background 120ms ease, transform 80ms ease, color 120ms ease;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }
    .btn:focus-visible { outline: none; box-shadow: var(--focus); }
    .btn:disabled { opacity: 0.55; cursor: not-allowed; }
    .btn.primary {
      background: var(--accent);
      color: var(--accent-fg);
      width: 100%;
    }
    .btn.primary:hover:not(:disabled) { background: var(--accent-hover); }
    .btn.primary:active:not(:disabled) { transform: translateY(1px); }
    .btn.link {
      background: transparent;
      color: var(--accent);
      padding: 0 8px;
      height: 44px;
    }
    .btn.link:hover { color: var(--accent-hover); background: var(--surface-2); }
    .btn.ghost {
      background: transparent;
      color: var(--text-muted);
      padding: 0 8px;
      height: 44px;
    }
    .btn.ghost:hover { color: var(--text); background: var(--surface-2); }

    .actions {
      margin-top: 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .actions .row {
      display: flex;
      gap: 4px;
      justify-content: space-between;
      align-items: center;
    }

    .notice {
      margin-top: 14px;
      padding: 10px 14px;
      border-radius: var(--radius-sm);
      font-size: 14px;
      line-height: 1.4;
    }
    .notice.error {
      background: var(--danger-bg);
      color: var(--danger);
    }
    .notice.info {
      background: var(--surface-2);
      color: var(--text-muted);
    }

    /* Issues list */
    .list-head {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 14px;
      padding: 0 4px;
    }
    .list-head h1 {
      margin: 0;
      font-size: 20px;
      font-weight: 600;
      letter-spacing: -0.01em;
    }
    .list-head .count {
      color: var(--text-muted);
      font-size: 13px;
      font-variant-numeric: tabular-nums;
    }

    ul.incidents {
      list-style: none;
      padding: 0;
      margin: 0;
      display: flex;
      flex-direction: column;
    }
    ul.incidents li {
      padding: 16px 0;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: flex-start;
      gap: 14px;
    }
    ul.incidents li:last-child { border-bottom: 0; padding-bottom: 4px; }
    ul.incidents li:first-child { padding-top: 4px; }
    ul.incidents li.clickable {
      cursor: pointer;
      margin: 0 -14px;
      padding-left: 14px;
      padding-right: 14px;
      border-radius: 10px;
      border-bottom-color: transparent;
      position: relative;
      transition: background 120ms ease;
    }
    ul.incidents li.clickable + li.clickable { border-top: 1px solid var(--border); }
    ul.incidents li.clickable:hover { background: var(--surface-2); }
    ul.incidents li.clickable:focus-visible { outline: none; box-shadow: var(--focus); }
    .chev {
      flex-shrink: 0;
      color: var(--text-subtle);
      align-self: center;
      transition: transform 120ms ease, color 120ms ease;
    }
    ul.incidents li.clickable:hover .chev { color: var(--text-muted); transform: translateX(2px); }
    .inc-body { flex: 1; min-width: 0; }
    .inc-title {
      font-weight: 500;
      color: var(--text);
      overflow-wrap: anywhere;
    }
    .inc-address {
      color: var(--text-muted);
      font-size: 14px;
      margin-top: 4px;
      overflow-wrap: anywhere;
    }
    .inc-chip {
      flex-shrink: 0;
      display: inline-flex;
      align-items: center;
      padding: 4px 10px;
      background: var(--surface-2);
      color: var(--text-muted);
      font-size: 12px;
      font-weight: 500;
      border-radius: 999px;
      white-space: nowrap;
      max-width: 40%;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .empty {
      color: var(--text-muted);
      text-align: center;
      padding: 48px 20px;
    }
    .empty svg { color: var(--text-subtle); margin-bottom: 12px; }
    .empty .title { color: var(--text); font-weight: 500; margin-bottom: 4px; }

    .spinner {
      width: 22px; height: 22px;
      border-radius: 50%;
      border: 2px solid var(--border-strong);
      border-top-color: var(--accent);
      animation: spin 0.7s linear infinite;
      margin: 0 auto 12px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Detail view */
    .detail-back {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: transparent;
      border: 0;
      padding: 8px 10px 8px 6px;
      margin: 0 0 10px -6px;
      color: var(--text-muted);
      font: inherit;
      font-size: 14px;
      cursor: pointer;
      border-radius: 8px;
    }
    .detail-back:hover { color: var(--text); background: var(--surface-2); }
    .detail-back:focus-visible { outline: none; box-shadow: var(--focus); }

    .detail-head { margin: 0 0 20px; }
    .detail-head .chip-row { margin-bottom: 10px; }
    .detail-head h1 {
      margin: 0 0 6px;
      font-size: clamp(20px, 4.5vw, 24px);
      font-weight: 600;
      letter-spacing: -0.01em;
      overflow-wrap: anywhere;
    }
    .detail-head .detail-address {
      color: var(--text-muted);
      font-size: 15px;
      overflow-wrap: anywhere;
    }

    .detail-section + .detail-section { margin-top: 22px; }
    .detail-section h2 {
      margin: 0 0 10px;
      font-size: 12px;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }
    .detail-section p { margin: 0; line-height: 1.55; overflow-wrap: anywhere; }
    .detail-resolution {
      background: var(--surface-2);
      border-radius: 10px;
      padding: 14px 16px;
    }

    .detail-images {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: 8px;
    }
    .detail-images a {
      display: block;
      aspect-ratio: 1 / 1;
      background: var(--surface-2);
      border-radius: 10px;
      overflow: hidden;
      border: 1px solid var(--border);
    }
    .detail-images img {
      width: 100%; height: 100%;
      object-fit: cover;
      display: block;
      transition: transform 200ms ease;
    }
    .detail-images a:hover img { transform: scale(1.03); }

    .detail-meta {
      display: grid;
      grid-template-columns: max-content 1fr;
      gap: 8px 16px;
      font-size: 14px;
    }
    .detail-meta dt { color: var(--text-muted); }
    .detail-meta dd { margin: 0; color: var(--text); overflow-wrap: anywhere; }

    .hidden { display: none !important; }

    /* Motion */
    .step, .card { animation: fadeUp 200ms ease-out both; }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(4px); }
      to   { opacity: 1; transform: none; }
    }
    @media (prefers-reduced-motion: reduce) {
      * { animation: none !important; transition: none !important; }
    }

    /* Wide screens: a slight desktop refinement */
    @media (min-width: 640px) {
      header { padding-left: 32px; padding-right: 32px; }
      .btn.primary { width: auto; min-width: 140px; }
      .actions { flex-direction: row; align-items: center; justify-content: space-between; }
      .actions .primary-wrap { flex: 0 0 auto; }
    }
  </style>
</head>
<body>
  <header>
    <div class="brand">
      <span class="brand-mark" aria-hidden="true"></span>
      <span>wots</span>
    </div>
    <div id="who" class="who" aria-live="polite"></div>
  </header>

  <main>
    <section id="step-phone" class="step">
      <div class="card">
        <div class="step-head">
          <h1>Sign in</h1>
          <p>Enter your phone number and we'll text you a 4-digit code.</p>
        </div>
        <label for="phone">Phone number</label>
        <input id="phone" type="tel" placeholder="(555) 123-4567" autocomplete="tel" inputmode="tel" />
        <div class="actions">
          <div class="primary-wrap"><button id="send-code" class="btn primary">Send code</button></div>
        </div>
        <div id="phone-error" class="notice error hidden" role="alert"></div>
      </div>
    </section>

    <section id="step-code" class="step hidden">
      <div class="card">
        <div class="step-head">
          <h1>Enter code</h1>
          <p>Sent to <b><span id="code-phone"></span></b>.</p>
        </div>
        <label for="code">4-digit code</label>
        <input id="code" type="text" inputmode="numeric" maxlength="4" placeholder="••••" autocomplete="one-time-code" />
        <div class="actions">
          <div class="primary-wrap"><button id="verify" class="btn primary">Verify</button></div>
          <div class="row">
            <button id="resend" class="btn link" type="button">Resend code</button>
            <button id="back" class="btn ghost" type="button">Use another number</button>
          </div>
        </div>
        <div id="code-error" class="notice hidden" role="alert"></div>
      </div>
    </section>

    <section id="step-issues" class="step hidden">
      <div class="list-head">
        <h1>Your issues</h1>
        <span class="count"><span id="issues-count"></span></span>
      </div>
      <div class="card">
        <div id="issues-loading" class="empty">
          <div class="spinner" aria-hidden="true"></div>
          <div>Loading your issues…</div>
        </div>
        <ul id="issues" class="incidents hidden"></ul>
        <div id="issues-empty" class="empty hidden">
          <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M9 12l2 2 4-4" />
            <circle cx="12" cy="12" r="10" />
          </svg>
          <div class="title">All clear</div>
          <div>You have no reports yet.</div>
        </div>
        <div id="issues-error" class="notice error hidden" role="alert"></div>
      </div>
    </section>

    <section id="step-detail" class="step hidden">
      <button id="detail-back" class="detail-back" type="button">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M15 18l-6-6 6-6" />
        </svg>
        Issues
      </button>
      <div class="card">
        <div id="detail-loading" class="empty">
          <div class="spinner" aria-hidden="true"></div>
          <div>Loading report…</div>
        </div>
        <div id="detail-body" class="hidden"></div>
        <div id="detail-error" class="notice error hidden" role="alert"></div>
      </div>
    </section>
  </main>

  <script>
    const $ = (id) => document.getElementById(id);
    const show = (id) => $(id).classList.remove('hidden');
    const hide = (id) => $(id).classList.add('hidden');

    let session = null;
    let cachedItems = null;

    function setNotice(elId, msg, kind) {
      const el = $(elId);
      el.classList.remove('error', 'info');
      if (!msg) { hide(elId); el.textContent = ''; return; }
      el.classList.add(kind === 'info' ? 'info' : 'error');
      el.textContent = msg;
      show(elId);
    }

    function friendlyError(err) {
      const code = err && err.error;
      switch (code) {
        case 'INVALID_PHONE': return 'That phone number does not look right.';
        case 'INVALID_CODE_FORMAT': return 'Enter the 4-digit code.';
        case 'CODE_NOT_VALID': return 'That code was not accepted.';
        case 'SMS_THRESHOLD': return 'Too many attempts — try again later.';
        case 'TIMEOUT': return 'Request timed out. Try again.';
        case 'NETWORK_ERROR': return 'Network error. Try again.';
        default: return (err && err.message) || 'Something went wrong.';
      }
    }

    async function api(path, opts = {}) {
      const res = await fetch(path, {
        method: opts.method || 'GET',
        headers: {
          'content-type': 'application/json',
          ...(opts.token ? { authorization: `Bearer ${opts.token}` } : {}),
        },
        body: opts.body ? JSON.stringify(opts.body) : undefined,
      });
      const data = await res.json().catch(() => ({}));
      if (!res.ok) throw data;
      return data;
    }

    function showStep(step) {
      ['step-phone', 'step-code', 'step-issues', 'step-detail'].forEach(hide);
      show(step);
    }

    async function sendCode() {
      const phone = $('phone').value.trim();
      if (!phone) return setNotice('phone-error', 'Enter a phone number.');
      setNotice('phone-error', null);
      $('send-code').disabled = true;
      try {
        const r = await api('/api/start-login', { method: 'POST', body: { phone } });
        session = r.session;
        sessionStorage.setItem('wots-session', JSON.stringify(session));
        $('code-phone').textContent = session.phone;
        showStep('step-code');
        setTimeout(() => $('code').focus(), 50);
      } catch (err) {
        setNotice('phone-error', friendlyError(err));
      } finally {
        $('send-code').disabled = false;
      }
    }

    async function verify() {
      const code = $('code').value.trim();
      if (!code) return setNotice('code-error', 'Enter the code.');
      setNotice('code-error', null);
      $('verify').disabled = true;
      try {
        const r = await api('/api/complete-login', {
          method: 'POST',
          body: { session, code },
        });
        localStorage.setItem('wots-token', r.token);
        sessionStorage.removeItem('wots-session');
        renderWho(session && session.phone);
        await loadIssues(r.token);
      } catch (err) {
        setNotice('code-error', friendlyError(err));
      } finally {
        $('verify').disabled = false;
      }
    }

    async function resend() {
      if (!session) return;
      setNotice('code-error', null);
      try {
        await api('/api/resend-code', { method: 'POST', body: { session } });
        setNotice('code-error', 'A new code was sent.', 'info');
      } catch (err) {
        setNotice('code-error', friendlyError(err));
      }
    }

    function renderWho(phone) {
      const el = $('who');
      if (!phone) { el.textContent = ''; return; }
      el.innerHTML = '';
      const dot = document.createElement('span'); dot.className = 'dot';
      const label = document.createElement('span'); label.textContent = phone;
      el.appendChild(dot); el.appendChild(label);
    }

    async function loadIssues(token) {
      showStep('step-issues');
      show('issues-loading');
      hide('issues'); hide('issues-empty'); hide('issues-error');
      $('issues-count').textContent = '';
      try {
        const r = await api('/api/incidents', { token });
        hide('issues-loading');
        const items = r.items || [];
        $('issues-count').textContent = items.length
          ? `${items.length} report${items.length === 1 ? '' : 's'}`
          : '';
        if (items.length === 0) { show('issues-empty'); return; }
        cachedItems = items;
        const ul = $('issues');
        ul.innerHTML = '';
        for (const it of items) {
          const li = document.createElement('li');
          const clickable = !!it.id;
          if (clickable) {
            li.className = 'clickable';
            li.tabIndex = 0;
            li.setAttribute('role', 'button');
            li.setAttribute('aria-label', `View report ${it.primaryText || it.typeName || it.id}`);
            li.addEventListener('click', () => openDetail(it));
            li.addEventListener('keydown', (e) => {
              if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); openDetail(it); }
            });
          }
          const body = document.createElement('div');
          body.className = 'inc-body';
          const title = document.createElement('div');
          title.className = 'inc-title';
          title.textContent = it.primaryText || it.typeName || `Report ${it.id || ''}`;
          body.appendChild(title);
          if (it.address) {
            const addr = document.createElement('div');
            addr.className = 'inc-address';
            addr.textContent = it.address;
            body.appendChild(addr);
          }
          li.appendChild(body);
          if (it.typeName && it.primaryText && it.typeName !== it.primaryText) {
            const chip = document.createElement('span');
            chip.className = 'inc-chip';
            chip.textContent = it.typeName;
            li.appendChild(chip);
          }
          if (clickable) {
            const chev = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
            chev.setAttribute('class', 'chev');
            chev.setAttribute('width', '18'); chev.setAttribute('height', '18');
            chev.setAttribute('viewBox', '0 0 24 24');
            chev.setAttribute('fill', 'none');
            chev.setAttribute('stroke', 'currentColor');
            chev.setAttribute('stroke-width', '2');
            chev.setAttribute('stroke-linecap', 'round');
            chev.setAttribute('stroke-linejoin', 'round');
            chev.setAttribute('aria-hidden', 'true');
            const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
            path.setAttribute('d', 'M9 6l6 6-6 6');
            chev.appendChild(path);
            li.appendChild(chev);
          }
          ul.appendChild(li);
        }
        show('issues');
      } catch (err) {
        hide('issues-loading');
        if (err && (err.error === 'INVALID_JWT' || err.error === 'missing token')) {
          logout();
          return;
        }
        setNotice('issues-error', friendlyError(err));
      }
    }

    function openDetail(item) {
      showStep('step-detail');
      const body = $('detail-body');
      body.innerHTML = '';
      hide('detail-error');
      // Paint what we already know from the list, immediately.
      renderDetail(body, item, /*full=*/false);
      show('detail-body');
      hide('detail-loading');
      loadDetail(item);
    }

    async function loadDetail(item) {
      const token = localStorage.getItem('wots-token');
      if (!token || !item || !item.id) return;
      try {
        const r = await api(`/api/incidents/${encodeURIComponent(item.id)}`, { token });
        const full = r.incident || {};
        const merged = Object.assign({}, item, full);
        const body = $('detail-body');
        body.innerHTML = '';
        renderDetail(body, merged, /*full=*/true);
      } catch (err) {
        if (err && (err.error === 'INVALID_JWT' || err.error === 'missing token')) {
          logout();
          return;
        }
        setNotice('detail-error', friendlyError(err));
      }
    }

    function renderDetail(root, it, isFull) {
      const head = document.createElement('div');
      head.className = 'detail-head';

      if (it.typeName) {
        const chipRow = document.createElement('div');
        chipRow.className = 'chip-row';
        const chip = document.createElement('span');
        chip.className = 'inc-chip';
        chip.textContent = it.typeName;
        chipRow.appendChild(chip);
        head.appendChild(chipRow);
      }

      const h1 = document.createElement('h1');
      h1.textContent = it.primaryText || it.typeName || `Report ${it.id || ''}`;
      head.appendChild(h1);

      if (it.address) {
        const addr = document.createElement('div');
        addr.className = 'detail-address';
        addr.textContent = it.address;
        head.appendChild(addr);
      }
      root.appendChild(head);

      const imageUrls = it.userContent && Array.isArray(it.userContent.imageUrls)
        ? it.userContent.imageUrls : [];
      if (imageUrls.length) {
        const sec = section('Photos');
        const grid = document.createElement('div');
        grid.className = 'detail-images';
        for (const url of imageUrls) {
          const a = document.createElement('a');
          a.href = url; a.target = '_blank'; a.rel = 'noopener noreferrer';
          const img = document.createElement('img');
          img.src = url; img.alt = ''; img.loading = 'lazy';
          a.appendChild(img);
          grid.appendChild(a);
        }
        sec.appendChild(grid);
        root.appendChild(sec);
      }

      const noteText = (it.userContent && typeof it.userContent.text === 'string' && it.userContent.text.trim())
        || (typeof it.description === 'string' && it.description.trim())
        || '';
      if (noteText) {
        const sec = section('Notes');
        const p = document.createElement('p');
        p.textContent = noteText;
        sec.appendChild(p);
        root.appendChild(sec);
      }

      const resolution = (typeof it.publicResolution === 'string' && it.publicResolution.trim())
        || (typeof it.resolution === 'string' && it.resolution.trim())
        || '';
      if (resolution) {
        const sec = section('Resolution');
        const box = document.createElement('div');
        box.className = 'detail-resolution';
        const p = document.createElement('p');
        p.textContent = resolution;
        box.appendChild(p);
        sec.appendChild(box);
        root.appendChild(sec);
      }

      if (isFull) {
        const meta = buildMeta(it);
        if (meta.length) {
          const sec = section('Details');
          const dl = document.createElement('dl');
          dl.className = 'detail-meta';
          for (const [k, v] of meta) {
            const dt = document.createElement('dt'); dt.textContent = k;
            const dd = document.createElement('dd'); dd.textContent = v;
            dl.appendChild(dt); dl.appendChild(dd);
          }
          sec.appendChild(dl);
          root.appendChild(sec);
        }
      }
    }

    function section(title) {
      const sec = document.createElement('div');
      sec.className = 'detail-section';
      const h2 = document.createElement('h2');
      h2.textContent = title;
      sec.appendChild(h2);
      return sec;
    }

    function buildMeta(it) {
      const rows = [];
      const push = (k, v) => { if (v !== undefined && v !== null && v !== '') rows.push([k, String(v)]); };
      const fmt = (ts) => {
        const n = typeof ts === 'number' ? ts : Number(ts);
        if (!Number.isFinite(n) || n <= 0) return '';
        const ms = n < 1e12 ? n * 1000 : n;
        try { return new Date(ms).toLocaleString(); } catch (_) { return ''; }
      };
      push('Reported', fmt(it.createdAt || it.reportedAt || it.timestamp));
      push('Updated', fmt(it.updatedAt || it.resolvedAt));
      push('Status', it.status || it.state);
      push('Officer', (it.officer && (it.officer.name || it.officer.badge)) || it.officerName);
      push('Citation', it.citationDescription || (it.citation && it.citation.description));
      push('ID', it.id);
      return rows;
    }

    function logout() {
      localStorage.removeItem('wots-token');
      sessionStorage.removeItem('wots-session');
      session = null;
      $('phone').value = '';
      $('code').value = '';
      renderWho(null);
      showStep('step-phone');
      setTimeout(() => $('phone').focus(), 50);
    }

    $('send-code').addEventListener('click', sendCode);
    $('verify').addEventListener('click', verify);
    $('resend').addEventListener('click', resend);
    $('back').addEventListener('click', logout);
    $('detail-back').addEventListener('click', () => {
      showStep('step-issues');
      // list is still rendered from the last loadIssues; no refetch needed
    });
    $('phone').addEventListener('keydown', (e) => { if (e.key === 'Enter') sendCode(); });
    $('code').addEventListener('keydown', (e) => { if (e.key === 'Enter') verify(); });
    $('who').addEventListener('click', () => {
      if (localStorage.getItem('wots-token') && confirm('Log out?')) logout();
    });

    (function boot() {
      const token = localStorage.getItem('wots-token');
      if (token) {
        const saved = sessionStorage.getItem('wots-session');
        try { if (saved) renderWho(JSON.parse(saved).phone); } catch (_) {}
        loadIssues(token);
        return;
      }
      const saved = sessionStorage.getItem('wots-session');
      if (saved) {
        try {
          session = JSON.parse(saved);
          $('code-phone').textContent = session.phone;
          showStep('step-code');
          setTimeout(() => $('code').focus(), 50);
          return;
        } catch (_) { /* fall through */ }
      }
      showStep('step-phone');
      setTimeout(() => $('phone').focus(), 50);
    })();
  </script>
</body>
</html>
